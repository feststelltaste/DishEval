<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #08080d;
    color: #e0e0e8;
    display: flex;
    position: relative;
  }

  /* Left: content */
  .left {
    flex: 1;
    padding: 56px 52px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8888a0;
    margin-bottom: 24px;
  }
  .logo span { color: #818cf8; }

  h1 {
    font-size: 62px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 20px;
  }
  h1 .gradient {
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 20px;
    color: #8888a0;
    line-height: 1.5;
    max-width: 460px;
    margin-bottom: 36px;
  }

  /* Score strip */
  .scores {
    display: flex;
    gap: 28px;
  }
  .score-block {
    display: flex;
    flex-direction: column;
  }
  .score-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #6668a0;
    margin-bottom: 4px;
  }
  .score-value {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', ui-monospace, monospace;
    font-size: 32px;
    font-weight: 700;
  }
  .text-red { color: #ef4444; }
  .text-green { color: #22c55e; }
  .text-white { color: #e0e0e8; }

  /* Right: webcam image */
  .right {
    width: 480px;
    position: relative;
    overflow: hidden;
  }
  .right img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.7) contrast(1.1) brightness(0.75);
  }
  .right::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, #08080d 0%, transparent 40%),
      radial-gradient(ellipse at center, transparent 30%, rgba(8,8,13,0.5) 100%);
    z-index: 1;
  }

  /* Scanlines on image */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
  }

  /* Webcam HUD on image */
  .cam-hud {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 3;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', ui-monospace, monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-align: right;
    line-height: 1.6;
  }
  .rec-line {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    color: #ef4444;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .rec-dot {
    width: 7px; height: 7px;
    background: #ef4444;
    border-radius: 50%;
  }

  .cam-bottom {
    position: absolute;
    bottom: 16px; left: 16px; right: 16px;
    z-index: 3;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', ui-monospace, monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .fail-tag {
    border: 1px solid #ef4444;
    color: #ef4444;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
  }

  /* Subtle glow */
  .glow {
    position: absolute;
    top: 0; left: 0;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="left">
  <div class="logo">Dish<span>Eval</span> Benchmark</div>
  <h1>Can AI Do<br>Your <span class="gradient">Dishes</span>?</h1>
  <p class="subtitle">Can frontier AI unload your dishwasher and put the dishes away? No. No it can't.</p>
  <div class="scores">
    <div class="score-block">
      <span class="score-label">Best AI Score</span>
      <span class="score-value text-red">0.0%</span>
    </div>
    <div class="score-block">
      <span class="score-label">Human Baseline</span>
      <span class="score-value text-green">100%</span>
    </div>
    <div class="score-block">
      <span class="score-label">Models Tested</span>
      <span class="score-value text-white">7</span>
    </div>
  </div>
</div>

<div class="right">
  <img src="disheval.jpg" alt="">
  <div class="scanlines"></div>
  <div class="cam-hud">
    <div class="rec-line"><span class="rec-dot"></span> REC</div>
    <div>CAM-02</div>
    <div>2026-03-26 14:32:07</div>
  </div>
  <div class="cam-bottom">
    <span>SUBJECT: Claude Opus 4.6</span>
    <span class="fail-tag">0 dishes put away</span>
  </div>
</div>

</body>
</html>
